name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Validate and Heal Gradle Wrapper
        run: |
          mkdir -p gradle/wrapper
          curl -Lo gradle/wrapper/gradle-wrapper.jar https://github.com/gradle/gradle/raw/v9.3.1/gradle/wrapper/gradle-wrapper.jar

      - name: Decode Debug Keystore
        env:
          DEBUG_KEYSTORE_BASE64_SECRET: ${{ secrets.DEBUG_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$DEBUG_KEYSTORE_BASE64_SECRET" ]; then
            echo "Decoding debug keystore from GitHub Secret..."
            echo "$DEBUG_KEYSTORE_BASE64_SECRET" | base64 -d > debug.keystore
          elif [ -f debug.keystore.base64 ]; then
            echo "Decoding debug keystore from local debug.keystore.base64 file..."
            base64 -d debug.keystore.base64 > debug.keystore
          else
            echo "::error::Debug keystore could not be resolved! Neither 'DEBUG_KEYSTORE_BASE64' GitHub Secret was found nor 'debug.keystore.base64' file exists in the repository."
            echo "Please configure the 'DEBUG_KEYSTORE_BASE64' secret in your GitHub repository settings under Settings > Secrets and variables > Actions."
            exit 1
          fi

      - name: Disable in-process compilation for KSP compatibility
        run: |
          if [ -f gradle.properties ]; then
            echo "Removing kotlin.compiler.execution.strategy=in-process for GitHub Action build..."
            sed -i '/kotlin.compiler.execution.strategy/d' gradle.properties
          fi

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew assembleDebug -Pkotlin.compiler.execution.strategy=daemon
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
